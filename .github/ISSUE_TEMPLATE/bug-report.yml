name: Bug report
about: Report a broken path, missing dependency, wrong workflow, or inconsistent behavior
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: skill
    attributes:
      label: Affected skill
      placeholder: paper-reader-zh
    validations:
      required: true
  - type: textarea
    id: bug
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include file paths, workflow steps, or trigger phrases if relevant.
  - type: textarea
    id: logs
    attributes:
      label: Extra details
      description: Error messages, screenshots, environment details, etc.
