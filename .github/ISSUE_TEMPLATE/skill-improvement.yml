name: Skill improvement
about: Propose a new skill or improve an existing one
title: "[skill] "
labels: ["skill"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the research workflow gap, broken behavior, or improvement idea.
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Which skill is involved?
      placeholder: research-orchestrator-zh
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the skill change you want.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should users get after this change?
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Links, papers, screenshots, examples, previous workflow, etc.
